# ──────────────────────────────────────────────────────────────────────────
# Stochastix PRO — CI/CD Pipeline
#
# Stages:
#   1. lint     — flake8 / ruff style checks
#   2. test     — pytest unit test suite (services/analytics, ML detectors)
#   3. build    — Docker image build (multi-stage, cached layers)
#   4. publish  — push image to GHCR on main branch
#   5. deploy   — placeholder deploy step (AWS ECS / GCP Cloud Run / Azure
#                 Container Apps — pick one or trigger an external workflow)
# ──────────────────────────────────────────────────────────────────────────

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: stochastix

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: pip install ruff
      - name: Run ruff
        run: ruff check . --output-format=github

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt --no-deps
          pip install pytest numpy pandas
      - name: Run unit tests
        run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  